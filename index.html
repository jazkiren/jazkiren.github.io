<div class="members-rail">
    <div class="section-title" style="padding: 0;">ONLINE MEMBERS</div>
    <div id="dynamicOnlineList" style="display: flex; flex-direction: column; gap: 6px;"></div>

    <div class="section-title" style="padding: 12px 0 0 0;">OFFLINE MEMBERS</div>
    <div id="dynamicOfflineList" style="display: flex; flex-direction: column; gap: 6px; opacity: 0.6;"></div>
  </div>

  <script src="js/sounds.js"></script>
  <script src="js/calling.js"></script>
  <script>
    let user = {
      name: "",
      avatar: "https://api.dicebear.com/7.x/bottts/svg?seed=Cyber",
      status: "Coding...",
      bio: "Gang Chat member!",
      banner: "#5865f2",
      animation: "anim-glow",
      theme: "dark",
      stealthMode: false // Track offline spoofing status
    };

    let activeChannel = "general";
    let activeReply = null;
    let onlineUsersMap = new Map();
    let heartBeatTimer = null;

    // BroadcastChannel cross-tab communication setup
    const chatChannel = new BroadcastChannel('gng_chat_network');
    const emojis = ["😂", "🔥", "⚔️", "💀", "😎", "👍", "❤️", "🎮", "🚀", "🎉", "💩", "🤖", "👀", "💯", "✨"];

    window.onload = function() {
      if (localStorage.getItem('gngChatBanned') === 'true') {
        document.getElementById('bannedScreen').style.display = 'flex';
        return;
      }

      const savedUser = localStorage.getItem('gngChatUserPro');
      if (savedUser) {
        user = JSON.parse(savedUser);
        document.getElementById('loginOverlay').style.display = 'none';
        initApp();
      }

      buildEmojiPicker();
    };

    // Receive broadcast messages from other tabs
    chatChannel.onmessage = function(event) {
      const data = event.data;
      if (!data) return;

      if (data.type === 'CHAT_MESSAGE') {
        if (data.channel === activeChannel) {
          renderMessage(data.msg);
          SoundEngine.playMessageSound();
        }
        // If sender is not in stealth mode, update online status
        if (!data.isStealth) {
          updateMemberOnline(data.msg.author, data.msg.avatar);
        }
      }

      if (data.type === 'PRESENCE_PING') {
        if (!data.isStealth) {
          updateMemberOnline(data.user.name, data.user.avatar);
        } else {
          // If a user turned on stealth mode, remove from active map
          onlineUsersMap.delete(data.user.name);
          renderMembersList();
        }
      }

      if (data.type === 'CALL_INVITE' && data.targetUser === user.name) {
        document.getElementById('incomingCallerName').textContent = `${data.callerName} is calling...`;
        document.getElementById('incomingCallerAvatar').src = data.callerAvatar;
        document.getElementById('incomingCallOverlay').style.display = 'flex';
        SoundEngine.playRingtone();
      }
    };

    function initApp() {
      applyTheme(user.theme);
      updateUserFooter();
      updateProfilePreview();
      registerUserHistory(user.name, user.avatar);

      // Heartbeat pulse to maintain online state
      announcePresence();
      if (heartBeatTimer) clearInterval(heartBeatTimer);
      heartBeatTimer = setInterval(announcePresence, 8000);

      renderMembersList();
    }

    // Save every user who has ever logged in into localStorage history
    function registerUserHistory(username, avatar) {
      let history = JSON.parse(localStorage.getItem('gngChatUserRegistry') || '{}');
      history[username] = { name: username, avatar: avatar, lastSeen: Date.now() };
      localStorage.setItem('gngChatUserRegistry', JSON.stringify(history));
    }

    // Toggle stealth / spoofed offline state
    function toggleStealthMode() {
      user.stealthMode = !user.stealthMode;
      localStorage.setItem('gngChatUserPro', JSON.stringify(user));
      
      const statusLabel = document.getElementById('userStatusFooter');
      if (user.stealthMode) {
        statusLabel.textContent = "Offline (Spoofed)";
        statusLabel.style.color = "#f23f43";
        // Notify other tabs that this user has gone offline
        chatChannel.postMessage({
          type: 'PRESENCE_PING',
          user: { name: user.name, avatar: user.avatar },
          isStealth: true
        });
        onlineUsersMap.delete(user.name);
      } else {
        statusLabel.textContent = "Online";
        statusLabel.style.color = "var(--text-muted)";
        announcePresence();
      }
      renderMembersList();
    }

    function announcePresence() {
      if (user.name && !user.stealthMode) {
        chatChannel.postMessage({
          type: 'PRESENCE_PING',
          user: { name: user.name, avatar: user.avatar },
          isStealth: false
        });
        updateMemberOnline(user.name, user.avatar);
      }
    }

    function updateMemberOnline(name, avatar) {
      onlineUsersMap.set(name, { name, avatar, lastSeen: Date.now() });
      registerUserHistory(name, avatar);
      renderMembersList();
    }

    function renderMembersList() {
      const onlineContainer = document.getElementById('dynamicOnlineList');
      const offlineContainer = document.getElementById('dynamicOfflineList');
      const callUserList = document.getElementById('callUserList');

      if (!onlineContainer || !offlineContainer) return;

      onlineContainer.innerHTML = '';
      offlineContainer.innerHTML = '';
      if (callUserList) callUserList.innerHTML = '';

      // Call modal bot default option
      if (callUserList) {
        const botBtn = document.createElement('button');
        botBtn.className = 'btn-primary';
        botBtn.textContent = '📞 Call Bot (Test)';
        botBtn.onclick = () => startCallTarget('Bot');
        callUserList.appendChild(botBtn);
      }

      // Fetch all historical users from local storage
      const history = JSON.parse(localStorage.getItem('gngChatUserRegistry') || '{}');

      // 1. Render Online Users
      onlineUsersMap.forEach((userData, username) => {
        const card = document.createElement('div');
        card.className = 'member-card';
        card.innerHTML = `
          <div class="status-indicator online"></div>
          <img src="${userData.avatar}" style="width: 22px; height: 22px; border-radius: 50%;" />
          <span>${escapeHtml(username)}</span>
        `;
        onlineContainer.appendChild(card);

        if (callUserList && username !== user.name) {
          const userCallBtn = document.createElement('button');
          userCallBtn.className = 'btn-primary';
          userCallBtn.style.backgroundColor = '#383a40';
          userCallBtn.textContent = `📞 Call ${username}`;
          userCallBtn.onclick = () => startCallTarget(username);
          callUserList.appendChild(userCallBtn);
        }
      });

      // 2. Render Offline Users (anyone in history who is NOT in onlineUsersMap)
      Object.keys(history).forEach((username) => {
        if (!onlineUsersMap.has(username)) {
          const userData = history[username];
          const card = document.createElement('div');
          card.className = 'member-card';
          card.innerHTML = `
            <div class="status-indicator offline"></div>
            <img src="${userData.avatar}" style="width: 22px; height: 22px; border-radius: 50%;" />
            <span>${escapeHtml(username)}</span>
          `;
          offlineContainer.appendChild(card);
        }
      });
    }

    function signIn() {
      const val = document.getElementById('usernameInput').value.trim();
      if (!val) return;
      user.name = val;
      user.avatar = `https://api.dicebear.com/7.x/bottts/svg?seed=${encodeURIComponent(val)}`;
      localStorage.setItem('gngChatUserPro', JSON.stringify(user));
      document.getElementById('loginOverlay').style.display = 'none';
      initApp();
    }

    function handleKey(e) {
      if (e.key === 'Enter') {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text) return;

        const msgObj = {
          author: user.name,
          avatar: user.avatar,
          text: text,
          timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
          reply: activeReply
        };

        renderMessage(msgObj);

        // Broadcast chat message
        chatChannel.postMessage({
          type: 'CHAT_MESSAGE',
          channel: activeChannel,
          msg: msgObj,
          isStealth: user.stealthMode
        });

        input.value = '';
        cancelReply();
      }
    }

    function logout() {
      localStorage.clear();
      location.reload();
    }

    function escapeHtml(str) {
      return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }
  </script>
