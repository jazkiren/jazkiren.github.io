<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Squad Chat</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    /* Dynamic Body Background */
    body {
      background: #0f172a;
      color: #f8fafc;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      transition: background 0.3s ease;
    }

    /* Background Customization Options */
    body.bg-dark { background: #0f172a; }
    body.bg-neon {
      background: linear-gradient(-45deg, #0f172a, #1e1b4b, #311042, #0f172a);
      background-size: 400% 400%;
      animation: gradientBG 10s ease infinite;
    }
    body.bg-sunset {
      background: linear-gradient(-45deg, #2e1065, #701a75, #831843, #0f172a);
      background-size: 400% 400%;
      animation: gradientBG 10s ease infinite;
    }
    body.bg-cyber {
      background: linear-gradient(-45deg, #064e3b, #0284c7, #1e1b4b, #0f172a);
      background-size: 400% 400%;
      animation: gradientBG 10s ease infinite;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Sign-In Modal */
    .login-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: rgba(15, 23, 42, 0.95);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }

    .login-card {
      background-color: #1e293b;
      padding: 35px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      text-align: center;
      width: 320px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .login-card h2 { font-size: 1.5rem; }

    .login-card input {
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #334155;
      background-color: #0f172a;
      color: white;
      font-size: 1rem;
      outline: none;
    }

    .login-card button {
      padding: 12px;
      border-radius: 8px;
      border: none;
      background-color: #3b82f6;
      color: white;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
    }

    /* App Container */
    .app-container {
      display: flex;
      width: 95vw;
      height: 92vh;
      background-color: rgba(30, 41, 59, 0.9);
      backdrop-filter: blur(12px);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* Sidebar */
    .sidebar {
      width: 280px;
      background-color: rgba(15, 23, 42, 0.8);
      border-right: 1px solid #334155;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .sidebar-top h2 {
      font-size: 1.1rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #94a3b8;
      margin-bottom: 15px;
    }

    .user-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .user-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      font-size: 1rem;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }

    .online {
      background-color: #22c55e;
      box-shadow: 0 0 8px #22c55e88;
    }

    .settings-btn {
      background: #334155;
      border: none;
      color: white;
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    /* Chat Window */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .chat-header {
      padding: 20px 24px;
      border-bottom: 1px solid #334155;
      background-color: rgba(30, 41, 59, 0.8);
      font-size: 1.3rem;
      font-weight: bold;
    }

    .messages-container {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* Animated Messages */
    .message {
      max-width: 65%;
      padding: 12px 18px;
      border-radius: 12px;
      font-size: 1rem;
      line-height: 1.4;
      animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      word-wrap: break-word;
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: translateY(15px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .message.sent {
      align-self: flex-end;
      background-color: #3b82f6;
      color: white;
      border-bottom-right-radius: 2px;
    }

    .message.received {
      align-self: flex-start;
      background-color: #334155;
      color: #f8fafc;
      border-bottom-left-radius: 2px;
    }

    .msg-sender {
      font-size: 0.75rem;
      font-weight: bold;
      margin-bottom: 4px;
      opacity: 0.8;
    }

    /* Input Bar */
    .input-area {
      padding: 20px;
      border-top: 1px solid #334155;
      display: flex;
      gap: 12px;
      background-color: rgba(30, 41, 59, 0.8);
    }

    .input-area input {
      flex: 1;
      background-color: #0f172a;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 14px 18px;
      color: white;
      outline: none;
      font-size: 1rem;
    }

    .input-area button {
      background-color: #3b82f6;
      border: none;
      border-radius: 10px;
      padding: 0 24px;
      color: white;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
    }

    /* Settings Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: rgba(0,0,0,0.7);
      justify-content: center;
      align-items: center;
      z-index: 200;
    }

    .modal-content {
      background-color: #1e293b;
      padding: 30px;
      border-radius: 16px;
      width: 360px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .setting-option {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .setting-option label {
      font-size: 0.85rem;
      color: #94a3b8;
    }

    .setting-option input, .setting-option select {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #334155;
      background-color: #0f172a;
      color: white;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .modal-actions button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    .save-btn { background-color: #22c55e; color: white; }
    .logout-btn { background-color: #ef4444; color: white; }
  </style>
</head>
<body class="bg-dark" id="bodyBg">

  <div class="login-overlay" id="loginOverlay">
    <div class="login-card">
      <h2>Welcome to Squad Chat</h2>
      <input type="text" id="usernameInput" placeholder="Enter your display name..." />
      <button onclick="signIn()">Join Chat</button>
    </div>
  </div>

  <div class="app-container">
    <div class="sidebar">
      <div class="sidebar-top">
        <h2>Online Members</h2>
        <ul class="user-list" id="userList">
          <li class="user-item"><span class="status-dot online"></span> 🤖 Bot</li>
        </ul>
      </div>

      <button class="settings-btn" onclick="toggleSettings(true)">⚙️ Settings</button>
    </div>

    <div class="chat-area">
      <div class="chat-header"># general</div>
      
      <div class="messages-container" id="messageBox"></div>

      <div class="input-area">
        <input type="text" id="userInput" placeholder="Type a message..." onkeydown="handleKey(event)" />
        <button onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>

  <div class="modal" id="settingsModal">
    <div class="modal-content">
      <h3>Profile & Customization</h3>
      
      <div class="setting-option">
        <label>Display Name</label>
        <input type="text" id="editNameInput" />
      </div>

      <div class="setting-option">
        <label>Avatar Emoji</label>
        <select id="avatarSelect">
          <option value="😎">😎 Cool</option>
          <option value="🔥">🔥 Fire</option>
          <option value="👑">👑 Crown</option>
          <option value="👾">👾 Gamer</option>
          <option value="⚡">⚡ Electric</option>
        </select>
      </div>

      <div class="setting-option">
        <label>Animated Background</label>
        <select id="bgSelect" onchange="changeBackground(this.value)">
          <option value="bg-dark">Dark Mode (Default)</option>
          <option value="bg-neon">Neon Glow (Animated)</option>
          <option value="bg-sunset">Purple Sunset (Animated)</option>
          <option value="bg-cyber">Cyber Matrix (Animated)</option>
        </select>
      </div>

      <div class="modal-actions">
        <button class="save-btn" onclick="saveSettings()">Save</button>
        <button class="logout-btn" onclick="logout()">Sign Out</button>
      </div>
    </div>
  </div>

  <script>
    let currentUser = {
      name: "",
      avatar: "😎",
      bg: "bg-dark"
    };

    // Load Saved Session Memory on Startup
    window.onload = function() {
      const savedUser = localStorage.getItem('squadChatUser');
      if (savedUser) {
        currentUser = JSON.parse(savedUser);
        document.getElementById('loginOverlay').style.display = 'none';
        initChat();
      }
    };

    function signIn() {
      const nameInput = document.getElementById('usernameInput').value.trim();
      if (nameInput !== '') {
        currentUser.name = nameInput;
        localStorage.setItem('squadChatUser', JSON.stringify(currentUser));
        document.getElementById('loginOverlay').style.display = 'none';
        initChat();
      }
    }

    function initChat() {
      updateSidebar();
      changeBackground(currentUser.bg);
      
      // Send Bot Welcome Message once logged in
      const messageBox = document.getElementById('messageBox');
      if (messageBox.children.length === 0) {
        addMessage("Bot", "🤖", "Welcome to the chat, " + currentUser.name + "! 👋 Feel free to customize your profile in Settings.", "received");
      }
    }

    function updateSidebar() {
      const userList = document.getElementById('userList');
      userList.innerHTML = `
        <li class="user-item"><span class="status-dot online"></span> ${currentUser.name} ${currentUser.avatar} (You)</li>
        <li class="user-item"><span class="status-dot online"></span> Bot 🤖</li>
      `;
      document.getElementById('editNameInput').value = currentUser.name;
      document.getElementById('avatarSelect').value = currentUser.avatar;
      document.getElementById('bgSelect').value = currentUser.bg;
    }

    function addMessage(sender, avatar, text, type) {
      const messageBox = document.getElementById('messageBox');
      const newMsg = document.createElement('div');
      newMsg.className = `message ${type}`;
      
      const senderDiv = document.createElement('div');
      senderDiv.className = 'msg-sender';
      senderDiv.textContent = sender + " " + avatar;
      
      newMsg.appendChild(senderDiv);
      newMsg.appendChild(document.createTextNode(text));
      
      messageBox.appendChild(newMsg);
      messageBox.scrollTop = messageBox.scrollHeight;
    }

    function sendMessage() {
      const input = document.getElementById('userInput');
      const text = input.value.trim();
      
      if (text !== '') {
        addMessage(currentUser.name, currentUser.avatar, text, 'sent');
        input.value = '';
      }
    }

    function handleKey(event) {
      if (event.key === 'Enter') {
        sendMessage();
      }
    }

    function toggleSettings(show) {
      document.getElementById('settingsModal').style.display = show ? 'flex' : 'none';
    }

    function changeBackground(themeClass) {
      currentUser.bg = themeClass;
      document.getElementById('bodyBg').className = themeClass;
    }

    function saveSettings() {
      const newName = document.getElementById('editNameInput').value.trim();
      if (newName !== '') {
        currentUser.name = newName;
      }
      currentUser.avatar = document.getElementById('avatarSelect').value;
      currentUser.bg = document.getElementById('bgSelect').value;

      localStorage.setItem('squadChatUser', JSON.stringify(currentUser));
      updateSidebar();
      toggleSettings(false);
    }

    function logout() {
      localStorage.removeItem('squadChatUser');
      location.reload();
    }
  </script>

</body>
</html>
