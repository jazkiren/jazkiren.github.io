<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gng Chat Pro</title>
  <style>
    :root {
      --bg-main: #313338;
      --bg-sidebar: #2b2d31;
      --bg-rail: #1e1f22;
      --bg-card: #1e2024;
      --accent: #5865f2;
      --text-primary: #f2f3f5;
      --text-muted: #949ba4;
      --speaking-green: #23a55a;
    }
    body.theme-amoled { --bg-main: #000000; --bg-sidebar: #0a0a0a; --bg-rail: #050505; --bg-card: #121212; }
    body.theme-cyber { --bg-main: #0d0f18; --bg-sidebar: #131722; --bg-rail: #080a10; --bg-card: #1a1f2c; --accent: #00f0ff; }
    body.theme-purple { --bg-main: #130f26; --bg-sidebar: #1a1436; --bg-rail: #0c0919; --bg-card: #231b48; --accent: #9d4edd; }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
    body { background-color: var(--bg-rail); color: #dbdee1; height: 100vh; display: flex; overflow: hidden; }

    /* Layout Rails */
    .server-rail { width: 64px; background-color: var(--bg-rail); padding: 10px 0; display: flex; flex-direction: column; align-items: center; gap: 10px; border-right: 1px solid rgba(255,255,255,0.05); }
    .server-icon { width: 40px; height: 40px; background-color: var(--bg-main); border-radius: 12px; display: flex; justify-content: center; align-items: center; cursor: pointer; font-weight: bold; color: var(--text-primary); transition: all 0.2s ease; }
    .server-icon:hover, .server-icon.active { background-color: var(--accent); border-radius: 10px; }

    .sidebar { width: 220px; background-color: var(--bg-sidebar); display: flex; flex-direction: column; justify-content: space-between; }
    .sidebar-header { padding: 12px 14px; height: 48px; border-bottom: 1px solid rgba(0,0,0,0.2); font-weight: 700; color: var(--text-primary); display: flex; align-items: center; }
    .section-title { font-size: 0.7rem; text-transform: uppercase; color: var(--text-muted); font-weight: bold; padding: 12px 12px 6px 12px; letter-spacing: 0.5px; }
    
    .channel-list, .dm-list { list-style: none; }
    .channel-item, .dm-item { padding: 6px 10px; margin: 2px 6px; border-radius: 4px; cursor: pointer; color: var(--text-muted); font-size: 0.85rem; font-weight: 500; display: flex; align-items: center; gap: 6px; }
    .channel-item:hover, .channel-item.active, .dm-item:hover { background-color: rgba(255,255,255,0.06); color: var(--text-primary); }

    .user-footer { background-color: rgba(0,0,0,0.2); padding: 8px 10px; display: flex; align-items: center; justify-content: space-between; }
    .user-info { display: flex; align-items: center; gap: 8px; }
    .avatar-wrapper { position: relative; width: 28px; height: 28px; border-radius: 50%; }
    .avatar-sm { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; }
    .settings-cog { cursor: pointer; color: #b5bac1; font-size: 1rem; }

    /* Chat Main Area */
    .chat-container { flex: 1; background-color: var(--bg-main); display: flex; flex-direction: column; }
    .chat-header { height: 48px; border-bottom: 1px solid rgba(0,0,0,0.2); padding: 0 14px; display: flex; align-items: center; justify-content: space-between; font-weight: bold; color: var(--text-primary); }
    .header-actions { display: flex; gap: 8px; align-items: center; }
    .header-btn { cursor: pointer; background: var(--bg-sidebar); padding: 5px 10px; border-radius: 4px; font-size: 0.8rem; }

    .messages-view { flex: 1; padding: 14px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
    .msg-group { display: flex; gap: 12px; position: relative; }
    .msg-content { display: flex; flex-direction: column; gap: 2px; font-size: 0.9rem; }
    .msg-header { display: flex; align-items: center; gap: 6px; }
    .msg-author { font-weight: 600; color: var(--text-primary); font-size: 0.85rem; }
    .msg-timestamp { font-size: 0.7rem; color: var(--text-muted); }

    .input-wrapper { padding: 0 14px 16px 14px; position: relative; }
    .input-container { display: flex; background-color: #383a40; border-radius: 8px; align-items: center; padding: 2px 10px; }
    .chat-input { flex: 1; background-color: transparent; border: none; padding: 10px 6px; color: var(--text-primary); font-size: 0.88rem; outline: none; }

    .members-rail { width: 200px; background-color: var(--bg-sidebar); padding: 12px; display: flex; flex-direction: column; gap: 8px; }
    .member-card { display: flex; align-items: center; gap: 8px; font-weight: 500; font-size: 0.82rem; color: var(--text-muted); padding: 4px 6px; border-radius: 4px; }
    .status-indicator { width: 8px; height: 8px; border-radius: 50%; }
    .online { background-color: #23a55a; }
    .offline { background-color: #80848e; }

    /* Modals & Overlays */
    .overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center; z-index: 1000; }
    .modal-box { background-color: var(--bg-main); padding: 24px; border-radius: 6px; width: 320px; display: flex; flex-direction: column; gap: 12px; }
    .modal-box input { padding: 8px 10px; background-color: var(--bg-rail); border: 1px solid var(--bg-sidebar); color: white; border-radius: 4px; outline: none; }
    .btn-primary { background-color: var(--accent); color: white; border: none; padding: 8px 12px; font-weight: bold; border-radius: 4px; cursor: pointer; }

    .banned-screen { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #0f172a; color: #f23f43; z-index: 9999; justify-content: center; align-items: center; flex-direction: column; gap: 16px; font-weight: bold; }
  </style>
</head>
<body class="theme-dark">

  <div class="banned-screen" id="bannedScreen">
    ⛔ YOU HAVE BEEN BANNED FROM GNG CHAT
    <div style="background-color: #1e293b; padding: 20px; border-radius: 8px; display: flex; flex-direction: column; gap: 10px;">
      <span style="font-size: 0.8rem; color: #949ba4;">Enter Unban Code:</span>
      <input type="password" id="unbanCodeInput" style="padding: 8px; text-align: center;" placeholder="Enter Code..." onkeydown="if(event.key==='Enter') verifyUnbanCode()" />
      <button class="btn-primary" onclick="verifyUnbanCode()">Submit Code</button>
      <span id="banMsg" style="font-size: 0.75rem; color: #f23f43; display: none;">Incorrect Code!</span>
    </div>
  </div>

  <div class="overlay" id="loginOverlay">
    <div class="modal-box">
      <h3 style="color: white;">Welcome to Gng Chat Pro!</h3>
      <p style="color: #b5bac1; font-size: 0.8rem;">Enter your username to join.</p>
      <input type="text" id="usernameInput" placeholder="Username" onkeydown="if(event.key==='Enter') signIn()" />
      <button class="btn-primary" onclick="signIn()">Continue</button>
    </div>
  </div>

  <div class="overlay" id="panelModal" style="display: none;">
    <div class="modal-box">
      <h3 style="color: white;">🛠️ Owner & Admin Panel</h3>
      <button class="btn-primary" style="background-color: #e5a93c;" onclick="testBanSelf()">⚠️ Test Ban Screen</button>
      <button class="btn-primary" style="background-color: #da373c;" onclick="togglePanel(false)">Close Panel</button>
    </div>
  </div>

  <div class="server-rail">
    <div class="server-icon active">⚔️</div>
  </div>

  <div class="sidebar">
    <div>
      <div class="sidebar-header">Gng Chat Pro</div>
      <div class="section-title">Text Channels</div>
      <ul class="channel-list">
        <li class="channel-item active" id="chan-general"># general</li>
      </ul>
    </div>

    <div class="user-footer">
      <div class="user-info">
        <div class="avatar-wrapper">
          <img id="userAvatarFooter" class="avatar-sm" src="" />
        </div>
        <div style="display: flex; flex-direction: column; max-width: 90px;">
          <span id="userNameFooter" style="font-weight: bold; font-size: 0.8rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;"></span>
          <span id="userStatusFooter" style="font-size: 0.65rem; color: var(--text-muted);">Online</span>
        </div>
      </div>
      <div style="display: flex; gap: 8px; align-items: center;">
        <span title="Toggle Ghost Mode (Invisible)" onclick="toggleStealthMode()" style="cursor: pointer; font-size: 0.9rem;">👻</span>
        <span class="settings-cog" onclick="logout()" title="Logout & Reset">🚪</span>
      </div>
    </div>
  </div>

  <div class="chat-container">
    <div class="chat-header">
      <span># general</span>
      <div class="header-actions">
        <div class="header-btn" onclick="promptPanelAccess()" style="color: var(--accent);">🛠️ Panel</div>
      </div>
    </div>

    <div class="messages-view" id="messagesView"></div>

    <div class="input-wrapper">
      <div class="input-container">
        <input type="text" class="chat-input" id="chatInput" placeholder="Message #general..." onkeydown="handleKey(event)" />
      </div>
    </div>
  </div>

  <div class="members-rail">
    <div class="section-title" style="padding: 0;">ONLINE MEMBERS</div>
    <div id="dynamicOnlineList" style="display: flex; flex-direction: column; gap: 6px;"></div>

    <div class="section-title" style="padding: 12px 0 0 0;">OFFLINE MEMBERS</div>
    <div id="dynamicOfflineList" style="display: flex; flex-direction: column; gap: 6px; opacity: 0.65;"></div>
  </div>

  <script>
    let user = {
      name: "",
      avatar: "",
      stealthMode: false
    };

    let onlineUsersMap = new Map();
    let heartBeatTimer = null;
    const chatChannel = new BroadcastChannel('gng_chat_network');

    window.onload = function() {
      // Check ban state
      if (localStorage.getItem('gngChatBanned') === 'true') {
        const banElem = document.getElementById('bannedScreen');
        if (banElem) banElem.style.display = 'flex';
        return;
      }

      const savedUser = localStorage.getItem('gngChatUserPro');
      if (savedUser) {
        user = JSON.parse(savedUser);
        const loginElem = document.getElementById('loginOverlay');
        if (loginElem) loginElem.style.display = 'none';
        initApp();
      }
    };

    chatChannel.onmessage = function(event) {
      const data = event.data;
      if (!data) return;

      if (data.type === 'CHAT_MESSAGE') {
        renderMessage(data.msg);
        if (!data.isStealth) {
          updateMemberOnline(data.msg.author, data.msg.avatar);
        }
      }

      if (data.type === 'PRESENCE_PING') {
        if (!data.isStealth) {
          updateMemberOnline(data.user.name, data.user.avatar);
        } else {
          onlineUsersMap.delete(data.user.name);
          renderMembersList();
        }
      }
    };

    function initApp() {
      updateUserFooter();
      registerUserHistory(user.name, user.avatar);

      announcePresence();
      if (heartBeatTimer) clearInterval(heartBeatTimer);
      heartBeatTimer = setInterval(announcePresence, 8000);

      renderMembersList();
    }

    function registerUserHistory(username, avatar) {
      let history = JSON.parse(localStorage.getItem('gngChatUserRegistry') || '{}');
      history[username] = { name: username, avatar: avatar, lastSeen: Date.now() };
      localStorage.setItem('gngChatUserRegistry', JSON.stringify(history));
    }

    function toggleStealthMode() {
      user.stealthMode = !user.stealthMode;
      localStorage.setItem('gngChatUserPro', JSON.stringify(user));
      
      const statusLabel = document.getElementById('userStatusFooter');
      if (user.stealthMode) {
        statusLabel.textContent = "Offline (Spoofed)";
        statusLabel.style.color = "#f23f43";
        chatChannel.postMessage({
          type: 'PRESENCE_PING',
          user: { name: user.name, avatar: user.avatar },
          isStealth: true
        });
        onlineUsersMap.delete(user.name);
      } else {
        statusLabel.textContent = "Online";
        statusLabel.style.color = "var(--text-muted)";
        announcePresence();
      }
      renderMembersList();
    }

    function announcePresence() {
      if (user.name && !user.stealthMode) {
        chatChannel.postMessage({
          type: 'PRESENCE_PING',
          user: { name: user.name, avatar: user.avatar },
          isStealth: false
        });
        updateMemberOnline(user.name, user.avatar);
      }
    }

    function updateMemberOnline(name, avatar) {
      onlineUsersMap.set(name, { name, avatar, lastSeen: Date.now() });
      registerUserHistory(name, avatar);
      renderMembersList();
    }

    function renderMembersList() {
      const onlineContainer = document.getElementById('dynamicOnlineList');
      const offlineContainer = document.getElementById('dynamicOfflineList');

      if (!onlineContainer || !offlineContainer) return;

      onlineContainer.innerHTML = '';
      offlineContainer.innerHTML = '';

      const history = JSON.parse(localStorage.getItem('gngChatUserRegistry') || '{}');

      // Online
      onlineUsersMap.forEach((userData, username) => {
        const card = document.createElement('div');
        card.className = 'member-card';
        card.innerHTML = `
          <div class="status-indicator online"></div>
          <img src="${userData.avatar}" style="width: 22px; height: 22px; border-radius: 50%;" />
          <span>${escapeHtml(username)}</span>
        `;
        onlineContainer.appendChild(card);
      });

      // Persistent Offline
      Object.keys(history).forEach((username) => {
        if (!onlineUsersMap.has(username)) {
          const userData = history[username];
          const card = document.createElement('div');
          card.className = 'member-card';
          card.innerHTML = `
            <div class="status-indicator offline"></div>
            <img src="${userData.avatar}" style="width: 22px; height: 22px; border-radius: 50%;" />
            <span>${escapeHtml(username)}</span>
          `;
          offlineContainer.appendChild(card);
        }
      });
    }

    function signIn() {
      const val = document.getElementById('usernameInput').value.trim();
      if (!val) return;
      user.name = val;
      user.avatar = `https://api.dicebear.com/7.x/bottts/svg?seed=${encodeURIComponent(val)}`;
      localStorage.setItem('gngChatUserPro', JSON.stringify(user));
      document.getElementById('loginOverlay').style.display = 'none';
      initApp();
    }

    function handleKey(e) {
      if (e.key === 'Enter') {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text) return;

        const msgObj = {
          author: user.name,
          avatar: user.avatar,
          text: text,
          timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
        };

        renderMessage(msgObj);

        chatChannel.postMessage({
          type: 'CHAT_MESSAGE',
          msg: msgObj,
          isStealth: user.stealthMode
        });

        input.value = '';
      }
    }

    function renderMessage(msg) {
      const view = document.getElementById('messagesView');
      if (!view) return;

      const div = document.createElement('div');
      div.className = 'msg-group';
      div.innerHTML = `
        <img class="avatar-sm" src="${msg.avatar}" />
        <div class="msg-content">
          <div class="msg-header">
            <span class="msg-author">${escapeHtml(msg.author)}</span>
            <span class="msg-timestamp">${msg.timestamp}</span>
          </div>
          <div>${escapeHtml(msg.text)}</div>
        </div>
      `;

      view.appendChild(div);
      view.scrollTop = view.scrollHeight;
    }

    function updateUserFooter() {
      document.getElementById('userNameFooter').textContent = user.name;
      document.getElementById('userAvatarFooter').src = user.avatar;
    }

    function promptPanelAccess() {
      const code = prompt("Enter Admin Access Code:");
      if (code === "9785") {
        document.getElementById('panelModal').style.display = 'flex';
      } else if (code !== null) {
        alert("Access Denied!");
      }
    }

    function togglePanel(show) {
      document.getElementById('panelModal').style.display = show ? 'flex' : 'none';
    }

    function testBanSelf() {
      togglePanel(false);
      localStorage.setItem('gngChatBanned', 'true');
      document.getElementById('bannedScreen').style.display = 'flex';
    }

    function verifyUnbanCode() {
      const code = document.getElementById('unbanCodeInput').value;
      if (code === "9785") {
        localStorage.removeItem('gngChatBanned');
        document.getElementById('bannedScreen').style.display = 'none';
        alert("Account Unbanned!");
      } else {
        document.getElementById('banMsg').style.display = 'block';
      }
    }

    function logout() {
      localStorage.clear();
      location.reload();
    }

    function escapeHtml(str) {
      return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }
  </script>
</body>
</html>
