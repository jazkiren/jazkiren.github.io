<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gng Chat Pro</title>

  <link rel="stylesheet" href="ui.css" />
</head>
<body>

  <div class="server-rail">
    <div class="server-icon active">⚔️</div>
  </div>

  <div class="sidebar">
    <div class="sidebar-header" style="padding: 12px; font-weight: bold;">
      <span>Gng Chat Pro</span>
    </div>
    <div style="padding: 12px; font-size: 0.7rem; color: var(--text-muted);">TEXT CHANNELS</div>
    <ul style="list-style: none; padding: 0 10px;">
      <li style="padding: 6px; cursor: pointer; color: var(--text-primary);"># general</li>
    </ul>
  </div>

  <div class="chat-container">
    <div style="height: 48px; padding: 0 14px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(0,0,0,0.2);">
      <span># general</span>
      <button onclick="initiateCallSequence()" style="background: var(--accent); color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer;">📞 Call</button>
    </div>

    <div class="messages-view" id="messagesView" style="flex: 1; padding: 14px; overflow-y: auto;"></div>

    <div class="input-wrapper">
      <div class="input-container">
        <input type="text" class="chat-input" id="chatInput" placeholder="Message #general..." onkeydown="handleKey(event)" />
      </div>
    </div>
  </div>

  <div class="members-rail" id="membersList">
    <div style="font-size: 0.7rem; color: var(--text-muted); font-weight: bold;">ONLINE MEMBERS</div>
  </div>

  <script src="js/sounds.js"></script>
  <script src="js/calling.js"></script>

  <script>
    let activeUser = "You";
    let onlineUsers = ["You", "Bot"];

    window.onload = function() {
      renderMembers();

      // Trigger Discord Join Sound on First User Click Interaction
      document.body.addEventListener('click', () => {
        SoundEngine.playJoinSound();
      }, { once: true });
    };

    function renderMembers() {
      const container = document.getElementById('membersList');
      container.innerHTML = `<div style="font-size: 0.7rem; color: var(--text-muted); font-weight: bold; margin-bottom: 8px;">ONLINE MEMBERS</div>`;
      
      onlineUsers.forEach(user => {
        const div = document.createElement('div');
        div.className = 'member-card';
        div.innerHTML = `
          <span class="status-indicator online"></span>
          <span style="color: var(--text-primary); font-size: 0.85rem;">${user}</span>
        `;
        container.appendChild(div);
      });
    }

    function handleKey(e) {
      if (e.key === 'Enter') {
        const input = document.getElementById('chatInput');
        const msg = input.value.trim();
        if (msg !== '') {
          addMessage(activeUser, msg);
          input.value = '';
        }
      }
    }

    function addMessage(author, text) {
      const view = document.getElementById('messagesView');
      const div = document.createElement('div');
      div.style.marginBottom = "10px";
      div.innerHTML = `<strong style="color: var(--accent);">${author}:</strong> ${text}`;
      view.appendChild(div);
      view.scrollTop = view.scrollHeight;

      // Sound trigger
      SoundEngine.playMessageSound();

      // Sync active chatter into online list
      if (!onlineUsers.includes(author)) {
        onlineUsers.push(author);
        renderMembers();
      }
    }
  </script>
</body>
</html>
