<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Discord Clone</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'gg sans', 'Noto Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    body {
      background-color: #1e1f22;
      color: #dbdee1;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* 1. Server/Clan Rail */
    .server-rail {
      width: 72px;
      background-color: #1e1f22;
      padding: 12px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      border-right: 2px solid #2b2d31;
    }

    .server-icon {
      width: 48px;
      height: 48px;
      background-color: #313338;
      border-radius: 12px;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      font-weight: bold;
      color: #f2f3f5;
      position: relative;
      transition: background 0.2s;
    }

    .server-icon:hover, .server-icon.active {
      background-color: #5865f2;
      border-radius: 10px;
    }

    /* Notification Badge */
    .badge {
      position: absolute;
      top: -4px;
      right: -4px;
      background-color: #f23f43;
      color: white;
      font-size: 0.75rem;
      font-weight: bold;
      padding: 2px 6px;
      border-radius: 10px;
      border: 3px solid #1e1f22;
      display: none;
    }

    /* 2. Channel & Direct Messages Sidebar */
    .sidebar {
      width: 240px;
      background-color: #2b2d31;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .sidebar-header {
      padding: 16px;
      border-bottom: 2px solid #1f2023;
      font-weight: bold;
      color: #f2f3f5;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .section-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      color: #949ba4;
      font-weight: bold;
      padding: 16px 16px 8px 16px;
    }

    .channel-list, .dm-list {
      list-style: none;
    }

    .channel-item, .dm-item {
      padding: 8px 16px;
      margin: 2px 8px;
      border-radius: 4px;
      cursor: pointer;
      color: #949ba4;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .channel-item:hover, .channel-item.active,
    .dm-item:hover, .dm-item.active {
      background-color: #35373c;
      color: #f2f3f5;
    }

    /* User Profile Footer */
    .user-footer {
      background-color: #232428;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .avatar-sm {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      object-fit: cover;
    }

    .settings-cog {
      cursor: pointer;
      color: #b5bac1;
      font-size: 1.2rem;
    }

    .settings-cog:hover { color: #f2f3f5; }

    /* 3. Main Chat View */
    .chat-container {
      flex: 1;
      background-color: #313338;
      display: flex;
      flex-direction: column;
    }

    .chat-header {
      height: 48px;
      border-bottom: 2px solid #2b2d31;
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-weight: bold;
      color: #f2f3f5;
    }

    .inbox-btn {
      position: relative;
      cursor: pointer;
      background: #2b2d31;
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 0.85rem;
    }

    .messages-view {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .msg-group {
      display: flex;
      gap: 16px;
      position: relative;
    }

    .msg-group:hover .reply-btn { display: block; }

    .msg-content {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .msg-header {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .msg-author {
      font-weight: bold;
      color: #f2f3f5;
    }

    .msg-timestamp {
      font-size: 0.75rem;
      color: #949ba4;
    }

    .reply-quote {
      font-size: 0.8rem;
      color: #b5bac1;
      border-left: 2px solid #4e5058;
      padding-left: 8px;
      margin-bottom: 4px;
    }

    .mention-highlight {
      background-color: rgba(88, 101, 242, 0.3);
      color: #c9cdfb;
      padding: 0 4px;
      border-radius: 3px;
      font-weight: bold;
    }

    .reply-btn {
      display: none;
      position: absolute;
      right: 10px;
      top: -10px;
      background-color: #2b2d31;
      border: 1px solid #3f4147;
      color: #b5bac1;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
      cursor: pointer;
    }

    /* Input Box */
    .input-wrapper {
      padding: 0 16px 24px 16px;
    }

    .reply-banner {
      display: none;
      background-color: #2b2d31;
      padding: 6px 12px;
      border-top-left-radius: 8px;
      border-top-right-radius: 8px;
      font-size: 0.85rem;
      color: #b5bac1;
      justify-content: space-between;
    }

    .chat-input {
      width: 100%;
      background-color: #383a40;
      border: none;
      padding: 14px;
      border-radius: 8px;
      color: #f2f3f5;
      font-size: 0.95rem;
      outline: none;
    }

    /* 4. Right Members Rail */
    .members-rail {
      width: 240px;
      background-color: #2b2d31;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .member-card {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: bold;
      color: #949ba4;
    }

    .status-indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .online { background-color: #23a55a; }

    /* Modals & Sign-in */
    .overlay {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background-color: rgba(0,0,0,0.85);
      display: flex; justify-content: center; align-items: center;
      z-index: 1000;
    }

    .modal-box {
      background-color: #313338;
      padding: 28px;
      border-radius: 4px;
      width: 480px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .modal-box input, .modal-box select {
      padding: 10px;
      background-color: #1e1f22;
      border: 1px solid #2b2d31;
      color: white;
      border-radius: 4px;
    }

    .preset-avatars {
      display: flex;
      gap: 10px;
    }

    .preset-avatars img {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
    }

    .preset-avatars img.selected { border-color: #5865f2; }

    .btn-primary {
      background-color: #5865f2;
      color: white;
      border: none;
      padding: 10px;
      font-weight: bold;
      border-radius: 4px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="overlay" id="loginOverlay">
    <div class="modal-box">
      <h2>Welcome Back!</h2>
      <p style="color: #b5bac1; font-size: 0.9rem;">Please enter your username to enter the clan server.</p>
      <input type="text" id="usernameInput" placeholder="Username" />
      <button class="btn-primary" onclick="signIn()">Continue</button>
    </div>
  </div>

  <div class="overlay" id="settingsModal" style="display: none;">
    <div class="modal-box" style="width: 560px;">
      <h2>Profile Customization</h2>
      
      <label style="font-size: 0.8rem; font-weight: bold; color: #b5bac1;">DISPLAY NAME</label>
      <input type="text" id="editNameInput" />

      <label style="font-size: 0.8rem; font-weight: bold; color: #b5bac1;">CHOOSE PRESET AVATAR</label>
      <div class="preset-avatars">
        <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Cyber" onclick="selectPreset(this.src, this)" class="selected" />
        <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Shadow" onclick="selectPreset(this.src, this)" />
        <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Blaze" onclick="selectPreset(this.src, this)" />
        <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Viper" onclick="selectPreset(this.src, this)" />
      </div>

      <label style="font-size: 0.8rem; font-weight: bold; color: #b5bac1;">OR UPLOAD YOUR OWN PIC</label>
      <input type="file" id="fileUpload" accept="image/*" onchange="handleFileUpload(event)" />

      <div style="display: flex; gap: 10px; margin-top: 10px;">
        <button class="btn-primary" style="flex: 1;" onclick="saveSettings()">Save Changes</button>
        <button class="btn-primary" style="background-color: #da373c;" onclick="toggleSettings(false)">Cancel</button>
      </div>
    </div>
  </div>

  <div class="server-rail">
    <div class="server-icon active">⚔️</div>
    <div class="server-icon">🔥</div>
  </div>

  <div class="sidebar">
    <div>
      <div class="sidebar-header">
        <span>Squad Clan</span>
      </div>

      <div class="section-title">Text Channels</div>
      <ul class="channel-list">
        <li class="channel-item active" onclick="switchChannel('general')"># general</li>
        <li class="channel-item" onclick="switchChannel('lounge')"># lounge</li>
      </ul>

      <div class="section-title">Direct Messages</div>
      <ul class="dm-list">
        <li class="dm-item" onclick="switchChannel('dm-bot')">💬 @Bot</li>
      </ul>
    </div>

    <div class="user-footer">
      <div class="user-info">
        <img id="userAvatarFooter" class="avatar-sm" src="" />
        <span id="userNameFooter" style="font-weight: bold; font-size: 0.9rem;"></span>
      </div>
      <span class="settings-cog" onclick="toggleSettings(true)">⚙️</span>
    </div>
  </div>

  <div class="chat-container">
    <div class="chat-header">
      <span id="chatTitle"># general</span>
      <div class="inbox-btn" onclick="clearMentions()">
        📬 Inbox
        <span class="badge" id="inboxBadge">0</span>
      </div>
    </div>

    <div class="messages-view" id="messagesView"></div>

    <div class="input-wrapper">
      <div class="reply-banner" id="replyBanner">
        <span id="replyBannerText">Replying to...</span>
        <span style="cursor: pointer;" onclick="cancelReply()">✕</span>
      </div>
      <input type="text" class="chat-input" id="chatInput" placeholder="Message #general..." onkeydown="handleKey(event)" />
    </div>
  </div>

  <div class="members-rail">
    <div class="section-title" style="padding: 0;">ONLINE — 2</div>
    <div class="member-card">
      <img id="userAvatarMember" class="avatar-sm" src="" />
      <span id="userNameMember" style="color: #f2f3f5;"></span>
      <span class="status-indicator online"></span>
    </div>
    <div class="member-card">
      <img class="avatar-sm" src="https://api.dicebear.com/7.x/bottts/svg?seed=Bot" />
      <span style="color: #f2f3f5;">Bot</span>
      <span class="status-indicator online"></span>
    </div>
  </div>

  <script>
    let user = {
      name: "",
      avatar: "https://api.dicebear.com/7.x/bottts/svg?seed=Cyber"
    };

    let activeChannel = "general";
    let activeReply = null;
    let mentionCount = 0;

    // Direct Memory Check
    window.onload = function() {
      const savedUser = localStorage.getItem('discordCloneUser');
      if (savedUser) {
        user = JSON.parse(savedUser);
        document.getElementById('loginOverlay').style.display = 'none';
        initApp();
      }
    };

    function signIn() {
      const name = document.getElementById('usernameInput').value.trim();
      if (name !== "") {
        user.name = name;
        localStorage.setItem('discordCloneUser', JSON.stringify(user));
        document.getElementById('loginOverlay').style.display = 'none';
        initApp();
      }
    }

    function initApp() {
      document.getElementById('userNameFooter').textContent = user.name;
      document.getElementById('userAvatarFooter').src = user.avatar;
      document.getElementById('userNameMember').textContent = user.name;
      document.getElementById('userAvatarMember').src = user.avatar;
      document.getElementById('editNameInput').value = user.name;
      
      // Default welcome message
      renderMessage("Bot", "https://api.dicebear.com/7.x/bottts/svg?seed=Bot", `Welcome to the server @${user.name}! Type @bot to talk to me.`, null);
    }

    function switchChannel(channelName) {
      activeChannel = channelName;
      document.getElementById('chatTitle').textContent = channelName.startsWith('dm') ? "@Bot" : `# ${channelName}`;
      document.getElementById('chatInput').placeholder = `Message ${document.getElementById('chatTitle').textContent}...`;
    }

    function renderMessage(author, avatar, text, replyQuote) {
      const view = document.getElementById('messagesView');
      const msgGroup = document.createElement('div');
      msgGroup.className = 'msg-group';

      let highlightedText = text;
      if (user.name && text.includes(`@${user.name}`)) {
        highlightedText = text.replace(`@${user.name}`, `<span class="mention-highlight">@${user.name}</span>`);
        triggerMention();
      }

      msgGroup.innerHTML = `
        <img class="avatar-sm" src="${avatar}" />
        <div class="msg-content">
          ${replyQuote ? `<div class="reply-quote">${replyQuote}</div>` : ''}
          <div class="msg-header">
            <span class="msg-author">${author}</span>
            <span class="msg-timestamp">${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
          </div>
          <div>${highlightedText}</div>
        </div>
        <button class="reply-btn" onclick="setReply('${author}', '${text}')">Reply</button>
      `;

      view.appendChild(msgGroup);
      view.scrollTop = view.scrollHeight;
    }

    function sendMessage() {
      const input = document.getElementById('chatInput');
      const text = input.value.trim();

      if (text !== '') {
        renderMessage(user.name, user.avatar, text, activeReply ? `Replying to ${activeReply.author}: "${activeReply.text}"` : null);
        input.value = '';
        cancelReply();

        // Bot Logic
        if (text.toLowerCase().includes('@bot')) {
          setTimeout(() => {
            handleBotResponse(text);
          }, 600);
        }
      }
    }

    function handleBotResponse(text) {
      const cleanText = text.replace(/@bot/gi, '').trim();
      
      // Check for gibberish or empty prompt
      const isGibberish = cleanText.length > 0 && !/[aeiouyAEIOUY]/i.test(cleanText);

      if (cleanText === '' || isGibberish) {
        renderMessage("Bot", "https://api.dicebear.com/7.x/bottts/svg?seed=Bot", `I don't get it...`, null);
      } else {
        renderMessage("Bot", "https://api.dicebear.com/7.x/bottts/svg?seed=Bot", `Hey @${user.name}! I heard you. What's up?`, null);
      }
    }

    function triggerMention() {
      mentionCount++;
      const badge = document.getElementById('inboxBadge');
      badge.textContent = mentionCount;
      badge.style.display = 'block';
    }

    function clearMentions() {
      mentionCount = 0;
      const badge = document.getElementById('inboxBadge');
      badge.style.display = 'none';
    }

    function setReply(author, text) {
      activeReply = { author, text };
      document.getElementById('replyBannerText').textContent = `Replying to @${author}`;
      document.getElementById('replyBanner').style.display = 'flex';
    }

    function cancelReply() {
      activeReply = null;
      document.getElementById('replyBanner').style.display = 'none';
    }

    function handleKey(e) {
      if (e.key === 'Enter') sendMessage();
    }

    function toggleSettings(show) {
      document.getElementById('settingsModal').style.display = show ? 'flex' : 'none';
    }

    function selectPreset(url, element) {
      document.querySelectorAll('.preset-avatars img').forEach(img => img.classList.remove('selected'));
      element.classList.add('selected');
      user.avatar = url;
    }

    function handleFileUpload(event) {
      const file = event.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          user.avatar = e.target.result;
        };
        reader.readAsDataURL(file);
      }
    }

    function saveSettings() {
      const newName = document.getElementById('editNameInput').value.trim();
      if (newName !== '') user.name = newName;

      localStorage.setItem('discordCloneUser', JSON.stringify(user));
      initApp();
      toggleSettings(false);
    }
  </script>
</body>
</html>
